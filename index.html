<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StoChart Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4f8; font-family: sans-serif; }

    #toolbar {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      display: flex; gap: 8px;
    }
    #toolbar button {
      padding: 6px 14px; border-radius: 6px; border: 1px solid #ccc;
      background: #fff; cursor: pointer; font-size: 13px;
    }
    #toolbar button:hover { background: #e8f0fe; }

    #chart { width: 100vw; height: 100vh; }
    .sto-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
  </style>
</head>
<body>

<div id="toolbar">
  <button onclick="chart.render()">Re-render</button>
</div>

<div id="chart"></div>

<!-- build this file first: npm run build -->
<script src="dist/sto-diagram.ak-sara.js"></script>
<script>
  const { StoChart } = StoDiagram
  // --- sample data (mimics org_organizational_units from DB) ---
  const data = [
    // ── Logical Directorate group ─────────────────────────────────────────
    // type:'logical-group' = invisible container rendered as background rect
    { id: 'dir-corp', label: 'Directorate', type: 'logical-group', parentId: null, role: 'du' },

    // members of the logical group (groupId links them into the compound)
    // role:'head' = Direktur Utama gets a colored top-bar to distinguish him
    { id: 'du', label: 'Direktur Utama', type: 'block', edge: 'regular', parentId: 'dir-corp', groupId: 'dir-corp' },
    { id: 'dc', label: 'Dir. Komersial', type: 'block', edge: 'regular', parentId: 'du', groupId: 'dir-corp' },
    { id: 'dr', label: 'Dir. Risiko',    type: 'block', edge: 'regular', parentId: 'du', groupId: 'dir-corp' },
    { id: 'do', label: 'Dir. Operasi',   type: 'block', edge: 'regular', parentId: 'du', groupId: 'dir-corp' },
    { id: 'dk', label: 'Dir. Keuangan',  type: 'block', edge: 'regular', parentId: 'du', groupId: 'dir-corp' },
    { id: 'dh', label: 'Dir. SDM',       type: 'block', edge: 'regular', parentId: 'du', groupId: 'dir-corp' },

    // ── neck / staff nodes (attached to Direktur Utama) ───────────────────
    { id: 'neck-grp', label: ' ', type: 'logical-group', edge: 'neck', parentId: 'du' },
    { id: 'ia', label: 'Internal Audit',      type: 'neck', parentId: null, groupId: 'neck-grp'},
    { id: 'cs', label: 'Corporate Secretary', type: 'neck', parentId: null, groupId: 'neck-grp'},

    // ── children of Dir. Komersial ────────────────────────────────────────
    { id: 'sbu', label: 'SBU Cargo & Logistics',  type: 'group', parentId: 'dir-corp', picId:'dc' },
    { id: 'cd',  label: 'Commercial Development', type: 'block', edge: 'regular', parentId: 'dc' },
    { id: 'cdv',  label: 'Partner Management', type: 'block', edge: 'regular', parentId: 'cd' },
    { id: 'cdp',  label: 'Product Management', type: 'block', edge: 'regular', parentId: 'cd' },

    // inside SBU
    { id: 'scs', label: 'Cargo Service',    type: 'block', edge: 'regular', groupId: 'sbu'},
    { id: 'log', label: 'Logistics',        type: 'block', edge: 'regular', groupId: 'sbu' },
    { id: 'cbe', label: 'Comm. & Biz Exc.', type: 'block', edge: 'regular', groupId: 'sbu' },

    // ── children of Dir. Risiko ───────────────────────────────────────────
    { id: 'ddr', label: 'Direktorat DR',  type: 'logical-group', parentId: 'dr'},
    { id: 'rm', label: 'Risk Management', type: 'block', edge: 'regular', groupId: 'ddr'  },
    { id: 'lg', label: 'Legal',           type: 'group', edge: 'regular', groupId: 'ddr',  head:'lgh' },
    { id: 'lgh', label: 'Legal Group Head', type: 'block', edge: 'regular',groupId: 'lg'  },
    { id: 'ldp', label: 'Unit Pidana', type: 'block', edge: 'regular', groupId: 'lg', parentId:'lgh' },
    { id: 'ldd', label: 'Unit Perdata', type: 'block', edge: 'regular', groupId: 'lg', parentId:'lgh'  },

    
  ]
  var userCard=`<div style="display:flex;gap:10px;align-items:center;height:100%">
              <div><img src="{image}" class="sto-avatar"/></div>
              <div style="overflow:hidden">
                <div style="font-weight:700;font-size:12px;white-space:nowrap">{name}</div>
                <div style="color:#6b7280;font-size:11px">{title}</div>
                <div style="color:#2c7be5;font-size:11px;font-weight:600">{level}</div>
              </div>
            </div>`;

  const user=[
    {stoid: 'dk', name:"Amelia", title:"Chief Financial Officer", level:"Level I", image:"1.gif"},
    {stoid: 'lgh', name:"Budi Santoso",title:"Risk Departement Group Head",level:"Level III", image:"2.jpg"},
  ]
  const chart = new StoChart('#chart')
  chart.load(data)
       .assign(user, userCard, { width: 200, height: 90 })
       .render()
</script>

</body>
</html>
